<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>契約一覧｜オーダーオート</title>
    <meta name="description" content="オーダーオートの車両販売契約書を入力フォームからPDF保存・印刷・メール・LINE送信用に作成できる契約作成システムです。" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="styles.css?v=contract29" />
  </head>
  <body class="admin-page contract-page sales-contract-system contract-list-page auth-loading">
    <header class="site-header admin-header">
      <a class="brand" href="contract.html" aria-label="オーダーオート 契約作成 ホーム">
        <span class="brand-mark" aria-hidden="true"><img src="assets/brand-logo.png" alt="" /></span>
        <span>
          <strong>オーダーオート 契約作成</strong>
          <small>車両販売</small>
        </span>
      </a>
      <div class="contract-header-actions">
        <a class="secondary-link" href="contract.html">トップ</a>
        <a class="secondary-link" href="contract-create.html">契約書作成</a>
        <a class="secondary-link" href="contract-list.html">契約一覧</a>
        <a class="secondary-link" href="contract-list.html?mode=remote">メール・LINE署名</a>
        <span class="admin-user-chip admin-only" id="adminUserLabel">ログイン中</span>
        <button class="secondary-link header-logout-button admin-only" type="button" id="adminLogoutButton">ログアウト</button>
      </div>
    </header>

    <main class="contract-main" id="top">
      <section class="contract-hero" aria-label="販売契約作成システム">
        <div class="section-inner contract-hero-inner">
          <div>
            <p class="section-kicker">Contract System</p>
            <h1>契約情報を入力して、帳票PDFを作成。</h1>
          </div>
        </div>
      </section>

      <section class="section contract-auth-section">
        <div class="section-inner auth-layout">
          <article class="auth-card" id="loginPanel">
            <p class="section-kicker">ADMIN LOGIN</p>
            <h2>管理者ログイン</h2>
            <p>Supabaseに登録した管理者アカウントでログインします。契約データはクラウド保存されます。</p>
            <div class="test-login-box" id="testLoginBox">
              <strong>テスト用</strong>
              <p>登録なしで各機能を確認できます。入力内容はこのブラウザ内だけに保存されます。</p>
              <button class="secondary-button test-login-button" type="button" id="testLoginButton">テスト用ログイン</button>
            </div>
            <form id="adminLoginForm" autocomplete="off">
              <label>
                <span>メールアドレス</span>
                <input name="email" type="email" autocomplete="username" required />
              </label>
              <label>
                <span>パスワード</span>
                <input name="password" type="password" autocomplete="current-password" required />
              </label>
              <button class="primary-link" type="submit">ログイン</button>
            </form>
            <p class="auth-status" id="authStatus" aria-live="polite">ログイン状態を確認しています。</p>
          </article>
        </div>
      </section>

      <section class="section contract-workspace admin-only">
        <div class="section-inner contract-list-layout">
          <div class="server-contract-panel contract-list-panel" id="list">
            <div class="contract-list-head">
              <div>
                <p class="section-kicker" id="contractListKicker">CONTRACTS</p>
                <h2 id="contractListTitle">契約一覧</h2>
              </div>
              <div class="contract-list-head-actions">
                <a class="secondary-button compact" href="contract.html">TOPに戻る</a>
                <a class="secondary-button compact" href="contract-create.html">追加</a>
              </div>
            </div>

            <p class="contract-list-description" id="contractListDescription" hidden></p>

            <div class="backup-actions" aria-label="バックアップ操作">
              <button class="secondary-button compact" type="button" id="exportContractsButton">JSON出力</button>
              <button class="secondary-button compact" type="button" id="importContractsButton">JSON取込</button>
              <input id="importContractsFile" type="file" accept="application/json,.json" hidden />
            </div>

            <label class="contract-search">
              <span>検索</span>
              <input id="contractListSearch" type="search" placeholder="名字・名前・車名・契約番号" />
            </label>

            <div class="status-tabs" id="contractStatusTabs" aria-label="ステータス絞り込み">
              <button type="button" class="active" data-filter="all">すべて</button>
              <button type="button" data-filter="見積保存">見積書</button>
              <button type="button" data-filter="下書き">下書き</button>
              <button type="button" data-filter="署名待ち">署名待ち</button>
              <button type="button" data-filter="送信済み">送信済み</button>
              <button type="button" data-filter="完了">完了</button>
            </div>

            <div class="contract-card-list" id="contractCardList" aria-live="polite"></div>
            <div class="contract-save-status" id="serverContractStatus" aria-live="polite"></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="src/contract-auth.js?v=supabase16"></script>
  </body>
</html>
