[build]
  command = "npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=()"
    Referrer-Policy = "no-referrer"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/contract.html"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/contract-create.html"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/contract-list.html"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/sales-sheet.html"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
